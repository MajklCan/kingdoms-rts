server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip text assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # hashed build assets — cache hard
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # audio (mp3/ogg) — cache a week, allow range requests (default on)
    location ~* \.(mp3|ogg|png|jpg|jpeg|webp)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # SPA fallback — single index.html, no server router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # health endpoint for deploy checks
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
