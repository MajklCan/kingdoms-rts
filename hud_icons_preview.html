<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kingdoms HUD Building Icons Preview</title>
  <style>
    body {
      background-color: #0b0906;
      color: #cfd8dc;
      font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
    }
    .preview-container {
      background: linear-gradient(180deg, #211b11 0%, #151008 45%, #0d0906 100%);
      border: 2px solid #6a5b2b;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      text-align: center;
      max-width: 600px;
    }
    h1 {
      color: #e8b923;
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 24px;
      letter-spacing: 0.05em;
    }
    p {
      color: #aab5bf;
      font-size: 14px;
      margin-bottom: 36px;
      line-height: 1.5;
    }
    .icons-row {
      display: flex;
      justify-content: center;
      gap: 36px;
      margin-bottom: 24px;
    }
    .icon-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      background: #282113;
      border: 1px solid #5c4b20;
      border-radius: 8px;
      padding: 24px 20px;
      width: 110px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 -10px 14px rgba(0,0,0,0.18);
    }
    .icon-title {
      font-size: 11px;
      font-weight: 700;
      color: #f2d16f;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    /* Voxel Icon Container (Scaled up 2x for preview details) */
    .hud-voxel-icon {
      position: relative;
      width: 56px;
      height: 56px;
      image-rendering: pixelated;
      overflow: hidden;
      filter: drop-shadow(2px 4px 0 rgba(0,0,0,0.45));
    }
    /* Voxel Elements */
    .hud-voxel-icon i {
      position: absolute;
      left: calc(var(--x) * 7px);
      top: calc(var(--y) * 7px);
      width: 14px;
      height: 14px;
      background: var(--c);
      box-shadow:
        2px 2px 0 rgba(0,0,0,0.28),
        inset 2px 2px 0 rgba(255,255,255,0.22);
    }
  </style>
</head>
<body>
  <div class="preview-container">
    <h1>Kingdoms HUD Building Icons</h1>
    <p>This is a live CSS-rendering preview of the upgraded 3D-shaded voxel HUD icons for the first three buildings, scaled 2x to show the detail of the new block arrangements.</p>
    
    <div class="icons-row">
      <!-- House Card -->
      <div class="icon-card">
        <div class="hud-voxel-icon" id="house-icon"></div>
        <div class="icon-title">House</div>
      </div>
      
      <!-- Mill Card -->
      <div class="icon-card">
        <div class="hud-voxel-icon" id="mill-icon"></div>
        <div class="icon-title">Mill</div>
      </div>
      
      <!-- Town Center Card -->
      <div class="icon-card">
        <div class="hud-voxel-icon" id="tc-icon"></div>
        <div class="icon-title">Town Center</div>
      </div>
    </div>
  </div>

  <script>
    const BUILDING_ICON_BLOCKS = {
      house: [
        // Roof Top
        [3, 0, '#d56c43'], [4, 0, '#c65636'],
        // Roof Upper Slope
        [2, 1, '#d56c43'], [3, 1, '#c65636'], [4, 1, '#a6402c'], [5, 1, '#7f3128'],
        // Roof Lower Slope
        [1, 2, '#d56c43'], [2, 2, '#c65636'], [3, 2, '#a6402c'], [4, 2, '#a6402c'], [5, 2, '#7f3128'], [6, 2, '#4d1c16'],
        // Timber Walls
        [2, 3, '#e1c17c'], [3, 3, '#c7a56b'], [4, 3, '#a97843'], [5, 3, '#6b3f1f'],
        [2, 4, '#c7a56b'], [3, 4, '#c7a56b'], [4, 4, '#a97843'], [5, 4, '#6b3f1f'],
        // Door
        [3, 5, '#6b3f1f'], [4, 5, '#4a2815'],
        // Foundation
        [1, 4, '#8d939a'], [6, 4, '#6f767d'],
        [1, 5, '#8d939a'], [2, 5, '#6f767d'], [5, 5, '#6f767d'], [6, 5, '#4a4f55'],
      ],
      mill: [
        // Sails Center Hub
        [3, 2, '#8f6135'],
        // Sails - Top Wing
        [3, 0, '#e1d4b5'], [4, 0, '#e1d4b5'],
        [3, 1, '#caa45d'],
        // Sails - Left Wing
        [0, 2, '#e1d4b5'], [1, 2, '#e1d4b5'],
        [2, 2, '#caa45d'],
        // Sails - Right Wing
        [4, 2, '#caa45d'], [5, 2, '#e1d4b5'], [6, 2, '#e1d4b5'],
        // Sails - Bottom Wing
        [3, 3, '#caa45d'],
        [2, 4, '#caa45d'], [3, 4, '#8f6135'],
        // Roof Dome
        [2, 1, '#a6402c'], [3, 1, '#7f3128'], [4, 1, '#4d1c16'],
        // Tower Body
        [2, 2, '#e1c17c'], [4, 2, '#a97843'],
        [2, 3, '#c7a56b'], [3, 3, '#a97843'], [4, 3, '#6b3f1f'],
        [2, 4, '#a97843'], [4, 4, '#4a2815'],
        [1, 5, '#6b3f1f'], [2, 5, '#6b3f1f'], [3, 5, '#4a2815'], [4, 5, '#4a2815'], [5, 5, '#28140a'],
      ],
      townCenter: [
        // Left Tower Roof
        [1, 0, '#4ecdc4'], [2, 0, '#2e86de'],
        [1, 1, '#2e86de'], [2, 1, '#1b5d9e'],
        // Right Tower Roof
        [5, 0, '#2e86de'], [6, 0, '#1b5d9e'],
        [5, 1, '#1b5d9e'], [6, 1, '#103e6b'],
        // Central Roof
        [3, 1, '#4ecdc4'], [4, 1, '#2e86de'],
        [3, 2, '#2e86de'], [4, 2, '#1b5d9e'],
        // Left Tower Body
        [1, 2, '#e1c17c'], [2, 2, '#c7a56b'],
        [1, 3, '#c7a56b'], [2, 3, '#a97843'],
        [1, 4, '#a97843'], [2, 4, '#6b3f1f'],
        // Right Tower Body
        [5, 2, '#c7a56b'], [6, 2, '#a97843'],
        [5, 3, '#a97843'], [6, 3, '#6b3f1f'],
        [5, 4, '#6b3f1f'], [6, 4, '#4a2815'],
        // Central Hall Stone Walls
        [3, 3, '#e1c17c'], [4, 3, '#c7a56b'],
        [3, 4, '#c7a56b'], [4, 4, '#a97843'],
        [3, 5, '#a97843'], [4, 5, '#6b3f1f'],
        // Central Gate
        [3, 6, '#4a2815'], [4, 6, '#28140a'],
        // Foundations
        [0, 5, '#6b3f1f'], [7, 5, '#4a2815'],
        [1, 5, '#6b3f1f'], [2, 5, '#6b3f1f'], [5, 5, '#4a2815'], [6, 5, '#4a2815'],
        [2, 6, '#4a2815'], [5, 6, '#28140a'],
      ]
    };

    function renderIcon(elementId, blocks) {
      const el = document.getElementById(elementId);
      if (!el) return;
      el.innerHTML = blocks
        .map(([x, y, color]) => `<i style="--x:${x};--y:${y};--c:${color}"></i>`)
        .join('');
    }

    renderIcon('house-icon', BUILDING_ICON_BLOCKS.house);
    renderIcon('mill-icon', BUILDING_ICON_BLOCKS.mill);
    renderIcon('tc-icon', BUILDING_ICON_BLOCKS.townCenter);
  </script>
</body>
</html>
